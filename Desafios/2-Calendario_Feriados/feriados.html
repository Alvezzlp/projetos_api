<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feriados Nacionais</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

  <div class="card shadow" style="width: 30rem;">
    
    <div class="card-body">
      <h5 class="card-title text-center mb-3">📅 Feriados 2024</h5>

      <!-- Tabela -->
      <table class="table table-striped">
        <thead>
          <tr>
            <th>Data</th>
            <th>Feriado</th>
          </tr>
        </thead>

        <!-- Corpo vazio -->
        <tbody id="tabelaFeriados">
        </tbody>
      </table>

    </div>

  </div>

  <script>
    const tabela = document.getElementById("tabelaFeriados");

    // Executa quando a página carrega
    window.addEventListener("load", () => {

    // Carregar dados
      fetch("https://brasilapi.com.br/api/feriados/v1/2024")
        .then(response => response.json())
        .then(dados => {

        // percorre cada item da lista
          dados.forEach(feriado => {

            // cria uma linha nova
            const linha = document.createElement("tr");

            // Inserindo conteúdo
            linha.innerHTML = `
              <td>${feriado.date}</td>
              <td>${feriado.name}</td>
            `;

            // adiciona a linha no <tbody>
            tabela.appendChild(linha);

          });

        })
        .catch(error => {
          console.log("Erro:", error);
        });

    });
  </script>

</body>
</html>
